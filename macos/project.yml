name: Readtube
options:
  bundleIdPrefix: com.readtube
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    ENABLE_APP_SANDBOX: NO
    ENABLE_HARDENED_RUNTIME: NO

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: "0.9.18"
  swift-markdown:
    url: https://github.com/apple/swift-markdown
    from: "0.4.0"

targets:
  Readtube:
    type: application
    platform: macOS
    sources:
      - path: Readtube
        excludes:
          - "Resources/**"
          - "Info.plist"
    resources:
      - path: Readtube/Resources
        buildPhase: resources
        excludes:
          - "yt-dlp"
    dependencies:
      - package: ZIPFoundation
      - package: swift-markdown
        product: Markdown
    settings:
      base:
        INFOPLIST_FILE: Readtube/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.readtube.app
        PRODUCT_NAME: Readtube
        GENERATE_INFOPLIST_FILE: false
    preBuildScripts:
      - name: Download yt-dlp
        script: |
          YT_DLP_PATH="${SRCROOT}/Readtube/Resources/yt-dlp"
          if [ ! -f "$YT_DLP_PATH" ]; then
            echo "Downloading yt-dlp..."
            curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o "$YT_DLP_PATH"
            chmod +x "$YT_DLP_PATH"
          fi
        basedOnDependencyAnalysis: false
    postCompileScripts:
      - name: Bundle yt-dlp
        script: |
          YT_DLP_SRC="${SRCROOT}/Readtube/Resources/yt-dlp"
          YT_DLP_DST="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/yt-dlp"
          if [ -f "$YT_DLP_SRC" ]; then
            cp "$YT_DLP_SRC" "$YT_DLP_DST"
            chmod +x "$YT_DLP_DST"
          fi
        basedOnDependencyAnalysis: false

  ReadtubeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - ReadtubeTests
      - path: Readtube/Services
      - path: Readtube/Models
    dependencies:
      - package: ZIPFoundation
      - package: swift-markdown
        product: Markdown
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
